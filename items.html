<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>คลังไอเทม — ครีปถือดาบ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f0f13;--bg2:#18181f;--bg3:#22222c;
  --border:#2e2e3a;--border2:#3e3e4e;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --orange:#e8822a;--green:#4caf7a;--green-dim:#0a2016;
  --red:#e05252;--red-dim:#220a0a;--blue:#5b8fd4;
  --yellow:#d4a843;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:16px;font-weight:600}
.hdr .sub{font-size:11px;color:var(--text3);margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:12px;cursor:pointer}
.btn-or{background:var(--orange);border-color:var(--orange);color:#fff}
.content{padding:12px 16px}

/* CATEGORIES */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.cat-tab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-family:'Sarabun',sans-serif;font-size:12px;padding:5px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-tab.active{background:var(--orange);border-color:var(--orange);color:#fff}

/* ADD FORM */
.add-card{background:var(--bg2);border:1px solid var(--orange);border-radius:var(--r);padding:14px;margin-bottom:14px}
.add-card h3{font-size:13px;font-weight:600;color:var(--orange);margin-bottom:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.finp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:8px 10px;width:100%}
.finp:focus{outline:none;border-color:var(--orange)}
select.finp option{background:var(--bg3)}
.add-btn{width:100%;background:var(--orange);border:none;border-radius:var(--rs);color:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:10px;cursor:pointer;margin-top:4px}

/* ITEM GRID */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.item-img{width:100%;height:110px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-img input[type=file]{position:absolute;top:0;left:0;width:100%;height:110px;opacity:0;cursor:pointer;z-index:2}
.item-body{padding:8px 10px}
.item-name{font-size:13px;font-weight:600;margin-bottom:2px}
.item-cat{font-size:10px;color:var(--text3);margin-bottom:6px}
.cat-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.item-actions{display:flex;gap:4px}
.iact-btn{flex:1;background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:'Sarabun',sans-serif;font-size:11px;padding:4px;cursor:pointer}
.iact-btn:hover{border-color:var(--orange);color:var(--orange)}
.iact-btn.del{border-color:var(--red-dim);color:var(--red)}
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.edit-overlay.show{display:flex}
.edit-modal{background:var(--bg2);border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;width:100%;padding:20px 16px 36px;max-height:80vh;overflow-y:auto}
.edit-modal h2{font-size:15px;font-weight:600;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:11px;border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none}
.mbtn-cancel{background:var(--bg3);color:var(--text2)}
.mbtn-save{background:var(--orange);color:#fff}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--orange);color:var(--text);padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;text-align:center}
.stat-num{font-size:18px;font-weight:700;color:var(--orange)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:1px}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><p style="color:var(--text2);font-size:14px">กำลังโหลดคลังไอเทม...</p></div>

<div class="hdr">
  <div>
    <h1>📦 คลังไอเทม <span class="sync-dot" id="syncDot"></span></h1>
    <div class="sub" id="lastUpdate">ครีปถือดาบ</div>
  </div>
  <a href="app.html" style="text-decoration:none"><button class="btn-sm">⚔️ กลับสต็อก</button></a>
</div>

<div class="content">
  <!-- STATS -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- ADD FORM -->
  <div class="add-card">
    <h3>➕ เพิ่มไอเทมใหม่</h3>
    <div class="form-row three">
      <input class="finp" id="newEmoji" placeholder="อีโมจิ 🎁" maxlength="4">
      <input class="finp" id="newName" placeholder="ชื่อไอเทม *">
      <select class="finp" id="newCat"></select>
    </div>
    <div class="form-row">
      <input class="finp" id="newBuy" type="number" placeholder="ราคารับซื้อ (ไม่ต้องใส่ก็ได้)" step="0.01">
      <input class="finp" id="newSell" type="number" placeholder="ราคาขาย (ไม่ต้องใส่ก็ได้)" step="0.01">
    </div>
    <button class="add-btn" onclick="addItem()">+ เพิ่มไอเทม</button>
  </div>

  <!-- CATEGORY MANAGE TOGGLE -->
  <div style="text-align:right;margin-bottom:8px">
    <button class="btn-sm" onclick="toggleCatManage()">🏷️ จัดการหมวดหมู่</button>
  </div>
  <div class="add-card" id="catManageCard" style="display:none;border-color:var(--blue)">
    <h3 style="color:var(--blue)">🏷️ จัดการหมวดหมู่</h3>
    <div id="catManageList"></div>
    <div class="form-row" style="grid-template-columns:1fr">
      <input class="finp" id="newCatName" placeholder="ชื่อหมวดหมู่ใหม่">
    </div>
    <button class="add-btn" onclick="addCat()">+ เพิ่มหมวดหมู่</button>
  </div>

  <!-- FILTER -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- GRID -->
  <div class="item-grid" id="itemGrid"></div>
</div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay" onclick="closeEdit()">
  <div class="edit-modal" onclick="event.stopPropagation()">
    <h2>✏️ แก้ไขไอเทม</h2>
    <div class="form-row three" style="margin-bottom:8px">
      <input class="finp" id="editEmoji" placeholder="อีโมจิ">
      <input class="finp" id="editName" placeholder="ชื่อไอเทม">
      <select class="finp" id="editCat"></select>
    </div>
    <div class="form-row">
      <input class="finp" id="editBuy" type="number" placeholder="ราคารับซื้อ" step="0.01">
      <input class="finp" id="editSell" type="number" placeholder="ราคาขาย" step="0.01">
    </div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeEdit()">ยกเลิก</button>
      <button class="mbtn-save" onclick="saveEdit()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyDtUip5OhtPC3Qnyj6SRNEuI9xaE47_pgA",authDomain:"creep-stock.firebaseapp.com",projectId:"creep-stock",storageBucket:"creep-stock.firebasestorage.app",messagingSenderId:"896850479864",appId:"1:896850479864:web:724a6d21b10247cbef090d"};
const db=getFirestore(initializeApp(FC));
const DR=doc(db,"stock","itemLibrary");

// หมวดหมู่เริ่มต้น (ใช้ตอนที่ยังไม่เคยมี cats เก็บใน Firebase — จะ migrate ให้อัตโนมัติตอนโหลดครั้งแรก)
const DEFAULT_CATS=[
  {name:"โบส้ม",color:"#e8822a"},{name:"โบแดง",color:"#e05252"},{name:"นักปราชญ์",color:"#9b6fd4"},
  {name:"แฟชั่น",color:"#5b8fd4"},{name:"สมุน",color:"#4caf7a"},{name:"หนาม",color:"#d4a843"},
  {name:"ปีก",color:"#5b8fd4"},{name:"การ์ด",color:"#e05252"},{name:"อื่นๆ",color:"#5a5a70"}
];
const NEW_CAT_PALETTE=['#e8822a','#e05252','#9b6fd4','#5b8fd4','#4caf7a','#d4a843','#5a5a70','#ec7fb3','#5ec9c9','#c4a25a'];

let items=[],catList=DEFAULT_CATS.map(c=>({...c})),activeCat="ทั้งหมด",editingId=null,saving=false,toastTm,catManageOpen=false;

function catColor(name){return (catList.find(c=>c.name===name)||{}).color||'var(--text3)';}
function catNames(){return ["ทั้งหมด",...catList.map(c=>c.name)];}

async function loadFB(){
  try{
    setSync('syncing');
    const snap=await getDoc(DR);
    if(snap.exists()){
      const d=snap.data();
      items=d.items||[];
      if(d.cats&&d.cats.length){
        catList=d.cats;
      } else {
        catList=DEFAULT_CATS.map(c=>({...c})); // ข้อมูลเก่ายังไม่มี cats -> migrate ให้ครั้งเดียว
        await setDoc(DR,{items,cats:catList});
      }
    } else {
      items=[];catList=DEFAULT_CATS.map(c=>({...c}));
      await setDoc(DR,{items:[],cats:catList});
    }
    document.getElementById('loading').style.display='none';
    renderAll();setSync('ok');
    onSnapshot(DR,sn=>{if(sn.exists()&&!saving){const d=sn.data();items=d.items||[];if(d.cats&&d.cats.length)catList=d.cats;renderAll();setSync('ok')}});
  }catch(e){
    setSync('error');document.getElementById('loading').style.display='none';
    toast('❌ เชื่อมต่อไม่ได้');
  }
}

async function save(){
  try{saving=true;setSync('syncing');await setDoc(DR,{items,cats:catList});setSync('ok');}
  catch(e){setSync('error');toast('❌ บันทึกไม่ได้');}
  finally{setTimeout(()=>{saving=false;},2000);}
}

function setSync(s){const d=document.getElementById('syncDot');d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');}

function uid(){let id;do{id='item'+Date.now()+Math.floor(Math.random()*1000);}while(items.some(x=>x.id===id));return id;}

window.addItem=async()=>{
  const name=document.getElementById('newName').value.trim();
  if(!name){toast('⚠️ ใส่ชื่อไอเทมก่อนครับ');return;}
  const emoji=document.getElementById('newEmoji').value.trim()||'📦';
  const cat=document.getElementById('newCat').value;
  const buy=parseFloat(document.getElementById('newBuy').value)||0;
  const sell=parseFloat(document.getElementById('newSell').value)||0;
  items.push({id:uid(),emoji,name,cat,buy,sell,img:''});
  await save();renderAll();
  document.getElementById('newName').value='';
  document.getElementById('newEmoji').value='';
  document.getElementById('newBuy').value='';
  document.getElementById('newSell').value='';
  toast('✅ เพิ่ม '+name+' แล้วครับ!');
};

window.delItem=async(id)=>{
  if(!confirm('ลบไอเทมนี้?'))return;
  items=items.filter(x=>x.id!==id);
  await save();renderAll();toast('🗑 ลบแล้วครับ');
};

window.openEdit=(id)=>{
  const item=items.find(x=>x.id===id);if(!item)return;
  editingId=id;
  document.getElementById('editEmoji').value=item.emoji||'';
  document.getElementById('editName').value=item.name||'';
  document.getElementById('editCat').value=item.cat||'อื่นๆ';
  document.getElementById('editBuy').value=item.buy||'';
  document.getElementById('editSell').value=item.sell||'';
  document.getElementById('editOverlay').classList.add('show');
};

window.saveEdit=async()=>{
  const item=items.find(x=>x.id===editingId);if(!item)return;
  item.emoji=document.getElementById('editEmoji').value.trim()||'📦';
  item.name=document.getElementById('editName').value.trim()||item.name;
  item.cat=document.getElementById('editCat').value;
  item.buy=parseFloat(document.getElementById('editBuy').value)||0;
  item.sell=parseFloat(document.getElementById('editSell').value)||0;
  await save();closeEdit();renderAll();toast('✅ บันทึกแล้วครับ!');
};

window.closeEdit=()=>{
  document.getElementById('editOverlay').classList.remove('show');
  editingId=null;
};

window.uploadImg=(id,input)=>{
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onerror=()=>toast('❌ อ่านไฟล์ไม่สำเร็จ ลองใหม่อีกครั้งครับ');
  r.onload=e=>{
    const i=new Image();
    i.onerror=()=>toast('❌ อัพรูปไม่สำเร็จ — ไฟล์รูปอาจเสียหรือฟอร์แมตไม่รองรับ (ลองเป็น .jpg/.png)');
    i.onload=async()=>{
      try{
        const cv=document.createElement('canvas');cv.width=120;cv.height=120;
        cv.getContext('2d').drawImage(i,0,0,120,120);
        const item=items.find(x=>x.id===id);
        if(!item){toast('❌ หาไอเทมนี้ไม่เจอ');return;}
        item.img=cv.toDataURL('image/jpeg',0.7);
        await save();renderAll();toast('✅ อัพรูปแล้วครับ!');
      }catch(err){toast('❌ อัพรูปไม่สำเร็จ: '+(err&&err.message||'unknown error'));}
    };
    i.src=e.target.result;
  };
  r.readAsDataURL(f);
  input.value='';
};

window.filterCat=(cat)=>{activeCat=cat;renderGrid();renderCatTabs();};

let toastT;
window.toast=(msg)=>{
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
};

function renderStats(){
  const total=items.length;
  const byCat={};catList.forEach(c=>{byCat[c.name]=items.filter(x=>x.cat===c.name).length;});
  const topCats=Object.entries(byCat).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,3);
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">ไอเทมทั้งหมด</div></div>
    ${topCats.map(([cat,n])=>`<div class="stat"><div class="stat-num" style="color:${catColor(cat)}">${n}</div><div class="stat-lbl">${cat}</div></div>`).join('')}
    ${topCats.length<3?`<div class="stat"><div class="stat-num" style="color:var(--text3)">${catList.filter(c=>!topCats.find(([cc])=>cc===c.name)).length}</div><div class="stat-lbl">หมวดอื่น</div></div>`:''}
  `;
}

function renderCatTabs(){
  document.getElementById('catTabs').innerHTML=catNames().map(cat=>{
    const count=cat==="ทั้งหมด"?items.length:items.filter(x=>x.cat===cat).length;
    return `<button class="cat-tab ${activeCat===cat?'active':''}" onclick="filterCat('${cat}')">${cat} ${count>0?'('+count+')':''}</button>`;
  }).join('');
}

function renderCatOptions(){
  const optsHTML=catList.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  const newSel=document.getElementById('newCat'),editSel=document.getElementById('editCat');
  const keepNew=newSel.value,keepEdit=editSel.value;
  newSel.innerHTML=optsHTML;editSel.innerHTML=optsHTML;
  if(catList.some(c=>c.name===keepNew))newSel.value=keepNew;
  if(catList.some(c=>c.name===keepEdit))editSel.value=keepEdit;
}

function renderCatManage(){
  const el=document.getElementById('catManageList');
  if(!el)return;
  el.innerHTML=catList.map(c=>{
    const count=items.filter(x=>x.cat===c.name).length;
    return `<div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:6px;align-items:center;margin-bottom:6px">
      <input type="color" value="${c.color}" onchange="updCatColor('${c.name}',this.value)" style="width:32px;height:32px;border:1px solid var(--border2);border-radius:6px;background:none;cursor:pointer;padding:0">
      <input class="finp" value="${c.name}" onchange="renameCat('${c.name}',this.value)">
      <span style="font-size:11px;color:var(--text3);white-space:nowrap">${count} ชิ้น</span>
      <button class="iact-btn del" style="flex:none;width:32px;padding:6px 0" onclick="delCat('${c.name}')">🗑</button>
    </div>`;
  }).join('');
}

window.toggleCatManage=()=>{
  catManageOpen=!catManageOpen;
  document.getElementById('catManageCard').style.display=catManageOpen?'block':'none';
  if(catManageOpen)renderCatManage();
};

window.addCat=async()=>{
  const input=document.getElementById('newCatName');
  const name=input.value.trim();
  if(!name){toast('⚠️ ใส่ชื่อหมวดหมู่ก่อนครับ');return;}
  if(catList.some(c=>c.name===name)){toast('⚠️ มีหมวดหมู่นี้อยู่แล้ว');return;}
  catList.push({name,color:NEW_CAT_PALETTE[catList.length%NEW_CAT_PALETTE.length]});
  input.value='';
  await save();renderAll();toast('✅ เพิ่มหมวดหมู่ '+name+' แล้วครับ');
};

window.renameCat=async(oldName,newName)=>{
  newName=newName.trim();
  if(!newName||newName===oldName){renderCatManage();return;}
  if(catList.some(c=>c.name===newName)){toast('⚠️ มีหมวดหมู่ชื่อนี้อยู่แล้ว');renderCatManage();return;}
  const cat=catList.find(c=>c.name===oldName);if(!cat)return;
  cat.name=newName;
  items.forEach(i=>{if(i.cat===oldName)i.cat=newName;});
  if(activeCat===oldName)activeCat=newName;
  await save();renderAll();toast('✅ เปลี่ยนชื่อหมวดหมู่แล้วครับ');
};

window.updCatColor=async(name,color)=>{
  const cat=catList.find(c=>c.name===name);if(!cat)return;
  cat.color=color;
  await save();renderAll();
};

window.delCat=async(name)=>{
  if(catList.length<=1){toast('⚠️ ต้องมีอย่างน้อย 1 หมวดหมู่');return;}
  const count=items.filter(i=>i.cat===name).length;
  const fallback=catList.find(c=>c.name!==name&&c.name==='อื่นๆ')||catList.find(c=>c.name!==name);
  const msg=count>0?`ลบหมวดหมู่ "${name}"? ไอเทม ${count} ชิ้นในหมวดนี้จะถูกย้ายไปหมวด "${fallback.name}"`:`ลบหมวดหมู่ "${name}"?`;
  if(!confirm(msg))return;
  items.forEach(i=>{if(i.cat===name)i.cat=fallback.name;});
  catList=catList.filter(c=>c.name!==name);
  if(activeCat===name)activeCat='ทั้งหมด';
  await save();renderAll();toast('🗑 ลบหมวดหมู่แล้วครับ');
};

function renderGrid(){
  const filtered=activeCat==="ทั้งหมด"?items:items.filter(x=>x.cat===activeCat);
  const el=document.getElementById('itemGrid');
  if(!filtered.length){
    el.innerHTML=`<div class="empty" style="grid-column:1/-1">ไม่มีไอเทมในหมวดนี้ครับ<br>กด + เพิ่มไอเทมใหม่ด้านบนได้เลย</div>`;
    return;
  }
  el.innerHTML=filtered.map(item=>{
    const color=catColor(item.cat);
    return `<div class="item-card">
      <div class="item-img" style="position:relative">
        ${item.img?`<img src="${item.img}" alt="">`:`<span style="font-size:40px">${item.emoji}</span>`}
        <input type="file" accept="image/*" onchange="uploadImg('${item.id}',this)" title="อัพโหลดรูป" style="position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2">
      </div>
      <div class="item-body">
        <div class="item-name">${item.emoji} ${item.name}</div>
        <div class="item-cat"><span class="cat-badge" style="background:${color}22;color:${color}">${item.cat}</span></div>
        ${item.buy||item.sell?`<div style="font-size:11px;color:var(--text3);margin-bottom:6px">ซื้อ ${item.buy||'-'} / ขาย ${item.sell||'-'}</div>`:'<div style="margin-bottom:6px"></div>'}
        <div class="item-actions">
          <button class="iact-btn" onclick="openEdit('${item.id}')">✏️ แก้</button>
          <button class="iact-btn del" onclick="delItem('${item.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll(){renderCatOptions();renderStats();renderCatTabs();renderGrid();if(catManageOpen)renderCatManage();}

loadFB();
</script>
</body>
</html>
